<html>
<head>
    <title>Student Feedback Form</title>
</head>
    <body>

<img src="121.jpg" width="600"><br><br>

<h2>Course Feedback Form</h2>

<form>
    <label>Full Name:</label><br>
    <input type="text" name="name" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" required><br><br>

    <label>Student ID:</label><br>
    <input type="text" name="student_id" required><br><br>
 

    <label>Course Name:</label><br>
    <input type="text" name="course" required><br><br>

    <label>Instructor Name:</label><br>
    <input type="text" name="instructor" required><br><br>

<label>Rate the Course (1 to 10):</label><br>
    <input type="range" name="rating" min="1" max="10" required><br><br>
    <label>Teaching Quality:</label><br>
    <select name="teaching" required>
        <option value="">Select</option>
        <option>Excellent</option>
        <option>Good</option>
        <option>Average</option>
        <option>Poor</option>
    </select><br><br>
    <label>Facilities Used:</label><br>
    <input type="checkbox" name="facility"> Library<br>
    <input type="checkbox" name="facility"> Lab<br>
    <input type="checkbox" name="facility"> Classroom<br><br>
